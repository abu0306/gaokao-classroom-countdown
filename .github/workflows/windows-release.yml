name: Windows Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (used when manually triggered, e.g. v1.0.1)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build Windows user packages
        run: npm run pack:user

      - name: Package classroom setup scripts
        shell: pwsh
        run: |
          if (-not (Test-Path dist)) {
            New-Item -ItemType Directory -Path dist | Out-Null
          }
          Compress-Archive -Path scripts/windows/* -DestinationPath dist/classroom-quick-setup.zip -Force

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists for manual trigger
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag="${{ steps.release_tag.outputs.tag }}"
          git fetch --tags origin
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "refs/tags/${tag}$"; then
            echo "Tag ${tag} already exists on origin."
          else
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${tag}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-portable-${{ steps.release_tag.outputs.tag }}
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.zip
