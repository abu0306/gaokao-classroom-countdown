<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高考倒计时</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="screen" id="screen">
      <section class="panel">
        <p class="school-name" id="schoolNameText"></p>
        <p class="class-name" id="classNameText">高三（7）班</p>
        <p class="label" id="countdownLabelText">距离高考</p>
        <h1 class="days" id="daysValue">--</h1>
        <p class="unit" id="daysUnit">天</p>
        <p class="target" id="targetDateText">目标日期：--</p>
        <blockquote class="quote" id="quoteText">每天进步一点点。</blockquote>
      </section>
      <footer class="footer" id="todayText"></footer>
    </main>
    <script type="module" src="./app.mjs"></script>
  </body>
</html>
